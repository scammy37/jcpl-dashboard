name: Fetch JCP&L Bill

on:
  schedule:
    - cron: '0 9 7-12 * *'  # 9am UTC daily from the 7th through 12th
  workflow_dispatch:         # manual trigger for testing

jobs:
  fetch-bill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright pdfplumber

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch and parse bill
        env:
          JCPL_COOKIES: ${{ secrets.JCPL_COOKIES }}
        run: python scripts/fetch_and_update.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload debug page dump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-page
          path: |
            debug_page.html
            debug_page.png
            debug_pdf_text.txt
          if-no-files-found: ignore

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if ! git diff --staged --quiet; then
            LABEL=$(python -c "import json; bills=json.load(open('data.json')); print(bills[-1]['label'])")
            git commit -m "Auto-add ${LABEL} bill"
            git push
          else
            echo "No new data to commit."
          fi

      - name: Read bill result
        if: always()
        id: result
        run: |
          if [ -f bill_result.txt ]; then
            echo "message=$(cat bill_result.txt)" >> $GITHUB_OUTPUT
          else
            echo "message=Script failed before completing — check the run log" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: michael.zagame@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "JCP&L Bill Check – ${{ steps.result.outputs.message }}"
          to: michael.zagame@gmail.com
          from: JCP&L Dashboard <michael.zagame@gmail.com>
          body: |
            JCP&L daily bill check — ${{ github.run_started_at }}

            Result: ${{ steps.result.outputs.message }}

            Full run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
