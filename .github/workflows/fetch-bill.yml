name: Fetch JCP&L Bill

on:
  schedule:
    - cron: '0 9 10 * *'   # 9am UTC on the 10th of every month
  workflow_dispatch:         # manual trigger for testing

jobs:
  fetch-bill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright pdfplumber

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch and parse bill
        env:
          JCPL_USERNAME: ${{ secrets.JCPL_USERNAME }}
          JCPL_PASSWORD: ${{ secrets.JCPL_PASSWORD }}
        run: python scripts/fetch_and_update.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload debug page dump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-page
          path: |
            debug_page.html
            debug_page.png
          if-no-files-found: ignore

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if ! git diff --staged --quiet; then
            LABEL=$(python -c "import json; bills=json.load(open('data.json')); print(bills[-1]['label'])")
            git commit -m "Auto-add ${LABEL} bill"
            git push
          else
            echo "No new data to commit."
          fi
